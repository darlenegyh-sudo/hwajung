<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 바이브 코딩 놀이터</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #4F8EF7;
    --blue-light: #EBF2FF;
    --blue-dark: #2563EB;
    --green: #34D399;
    --green-light: #ECFDF5;
    --yellow: #FBBF24;
    --yellow-light: #FFFBEB;
    --pink: #F472B6;
    --bg: #F0F4FF;
    --white: #FFFFFF;
    --text: #1E293B;
    --text-muted: #64748B;
    --border: #E2E8F0;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 4px 24px rgba(79,142,247,0.10);
    --shadow-lg: 0 8px 40px rgba(79,142,247,0.16);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    background: var(--white);
    border-bottom: 1.5px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(79,142,247,0.07);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 900;
    color: var(--blue-dark);
    text-decoration: none;
  }

  .logo-icon {
    font-size: 24px;
  }

  .header-badge {
    background: var(--blue-light);
    color: var(--blue-dark);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
  }

  /* Main layout */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 32px 32px;
    gap: 20px;
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
  }

  /* Hero */
  .hero {
    text-align: center;
    padding: 12px 0 4px;
  }

  .hero h1 {
    font-size: 28px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 8px;
  }

  .hero h1 span { color: var(--blue-dark); }

  .hero p {
    font-size: 15px;
    color: var(--text-muted);
    font-weight: 600;
  }

  /* Editor card */
  .editor-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 520px;
  }

  .editor-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    background: #F8FAFF;
    border-bottom: 1.5px solid var(--border);
  }

  .dots {
    display: flex;
    gap: 6px;
    margin-right: 4px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-r { background: #FC5F57; }
  .dot-y { background: #FDBC2C; }
  .dot-g { background: #34C748; }

  .toolbar-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    flex: 1;
    letter-spacing: 0.02em;
  }

  .toolbar-hint {
    font-size: 12px;
    color: #94A3B8;
    font-weight: 600;
  }

  .btn {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 7px 18px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-run {
    background: var(--blue-dark);
    color: white;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-run:hover { background: #1D4ED8; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
  .btn-run:active { transform: scale(0.97); }

  .btn-clear {
    background: transparent;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
  }
  .btn-clear:hover { background: #F1F5F9; }

  .btn-sample {
    background: var(--yellow-light);
    color: #92400E;
    border: 1.5px solid #FDE68A;
  }
  .btn-sample:hover { background: #FEF3C7; }

  /* Split pane */
  .split-pane {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
  }

  .pane {
    display: flex;
    flex-direction: column;
  }

  .pane + .pane {
    border-left: 1.5px solid var(--border);
  }

  .pane-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: #F8FAFF;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .pane-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  textarea {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    padding: 16px;
    background: #FAFBFF;
    color: var(--text);
    min-height: 400px;
  }

  textarea::placeholder { color: #CBD5E1; }

  iframe {
    flex: 1;
    border: none;
    width: 100%;
    min-height: 400px;
    background: white;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 18px;
    background: #F8FAFF;
    border-top: 1px solid var(--border);
  }

  .status-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #94A3B8;
    transition: background 0.3s;
  }
  .status-indicator.ok { background: var(--green); }
  .status-indicator.warn { background: var(--yellow); }

  .status-msg {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    flex: 1;
  }

  .shortcut-hint {
    font-size: 11px;
    color: #CBD5E1;
    font-weight: 600;
  }

  kbd {
    background: var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
  }

  /* Sample modal */
  .samples-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 12px 18px;
    background: #FFFBF0;
    border-bottom: 1px solid #FDE68A;
  }

  .sample-chip {
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1.5px solid #FDE68A;
    background: white;
    color: #92400E;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sample-chip:hover { background: #FEF3C7; transform: translateY(-1px); }

  .samples-label {
    font-size: 12px;
    font-weight: 700;
    color: #92400E;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .btn-share {
    background: #ECFDF5;
    color: #065F46;
    border: 1.5px solid #6EE7B7;
  }
  .btn-share:hover { background: #D1FAE5; }

  /* Share modal */
  .share-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .share-overlay.show { display: flex; }

  .share-modal {
    background: white;
    border-radius: 20px;
    padding: 28px 28px 24px;
    width: 480px;
    max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .share-modal h2 {
    font-size: 18px;
    font-weight: 900;
    color: var(--text);
  }

  .share-modal p {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 600;
    line-height: 1.6;
    margin-top: -8px;
  }

  .share-name-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .share-name-row label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
  }

  .share-name-row input {
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    outline: none;
    color: var(--text);
    background: #F8FAFF;
  }
  .share-name-row input:focus { border-color: var(--blue); }

  .share-url-box {
    display: flex;
    gap: 8px;
    align-items: center;
    background: #F8FAFF;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
  }

  .share-url-text {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    word-break: break-all;
    line-height: 1.5;
  }

  .btn-copy {
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 8px;
    border: none;
    background: var(--blue-dark);
    color: white;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-copy:hover { background: #1D4ED8; }
  .btn-copy.copied { background: #059669; }

  .share-modal-btns {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .btn-close-modal {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
  }
  .btn-close-modal:hover { background: #F1F5F9; }

  .btn-download {
    background: #ECFDF5;
    color: #065F46;
    border: 1.5px solid #6EE7B7;
  }
  .btn-download:hover { background: #D1FAE5; }

  @media (max-width: 768px) {
    main { padding: 16px; }
    .split-pane { grid-template-columns: 1fr; }
    .pane + .pane { border-left: none; border-top: 1.5px solid var(--border); }
    .toolbar-hint { display: none; }
    header { padding: 0 16px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <span class="logo-icon">✨</span>
    AI 바이브 코딩 놀이터
  </a>
  <span class="header-badge">상상하는 모든 것을 코드로!</span>
</header>

<main>
  <div class="hero">
    <h1>HTML 코드를 붙여넣고 <span>바로 실행</span>해보세요!</h1>
    <p>젬(Gemini)이 만들어준 코드를 여기서 실행하고 확인할 수 있어요 🚀</p>
  </div>

  <div class="editor-card">
    <div class="editor-toolbar">
      <div class="dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <span class="toolbar-label">코드 에디터</span>
      <span class="toolbar-hint">Ctrl+Enter로 빠르게 실행!</span>
      <button class="btn btn-sample" onclick="toggleSamples()">📋 예시 코드</button>
      <button class="btn btn-clear" onclick="clearAll()">지우기</button>
      <button class="btn btn-download" onclick="downloadCode()">⬇ 다운받기</button>
      <button class="btn btn-run" onclick="runCode()">
        ▶ 실행하기
      </button>
    </div>

    <div class="samples-bar" id="samplesBar" style="display:none;">
      <span class="samples-label">📦 예시 선택:</span>
      <button class="sample-chip" onclick="loadSample('hello')">👋 안녕하세요</button>
      <button class="sample-chip" onclick="loadSample('button')">🔘 버튼 클릭</button>
      <button class="sample-chip" onclick="loadSample('color')">🎨 색깔 바꾸기</button>
      <button class="sample-chip" onclick="loadSample('card')">🃏 카드 만들기</button>
      <button class="sample-chip" onclick="loadSample('counter')">🔢 숫자 세기</button>
    </div>

    <div class="split-pane">
      <div class="pane">
        <div class="pane-header">
          <div class="pane-dot" style="background:var(--blue)"></div>
          HTML 코드
        </div>
        <textarea id="editor" spellcheck="false" placeholder="여기에 HTML 코드를 붙여넣으세요!

예시:
&lt;h1&gt;안녕하세요!&lt;/h1&gt;
&lt;p&gt;저는 웹을 만들고 있어요 🎉&lt;/p&gt;
&lt;button onclick=&quot;alert('반가워요!')&quot;&gt;
  눌러보세요!
&lt;/button&gt;"></textarea>
      </div>
      <div class="pane">
        <div class="pane-header">
          <div class="pane-dot" style="background:var(--green)"></div>
          미리보기
        </div>
        <iframe id="preview" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-indicator" id="statusDot"></div>
      <span class="status-msg" id="statusMsg">코드를 붙여넣고 실행해보세요!</span>
      <span class="shortcut-hint"><kbd>Ctrl</kbd> + <kbd>Enter</kbd> 실행</span>
    </div>
  </div>
</main>

<!-- Share Modal -->
<div class="share-overlay" id="shareOverlay" onclick="closeShareIfBg(event)">
  <div class="share-modal">
    <h2>🔗 링크 만들기</h2>
    <p>내 작품을 친구들과 공유할 수 있는 링크예요!<br>이름을 입력하고 링크를 복사해서 보내보세요.</p>
    <div class="share-name-row">
      <label>내 이름 (선택)</label>
      <input type="text" id="shareNameInput" placeholder="예: 김민준" maxlength="20" oninput="updateShareUrl()" />
    </div>
    <div class="share-url-box">
      <span class="share-url-text" id="shareUrlText">링크 생성 버튼을 눌러주세요!</span>
      <button class="btn-copy" id="generateBtn" onclick="generateLink()">링크 생성</button>
      <button class="btn-copy" id="copyBtn" onclick="copyLink()" style="display:none;">복사</button>
    </div>
    <div class="share-modal-btns">
      <button class="btn-close-modal" onclick="closeShare()">닫기</button>
    </div>
  </div>
</div>

<script>
const samples = {
  hello: `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; background: #f0f9ff; }
    h1 { color: #2563EB; font-size: 2.5em; }
    p { color: #475569; font-size: 1.2em; }
    .emoji { font-size: 4em; }
  </style>
</head>
<body>
  <div class="emoji">👋</div>
  <h1>안녕하세요!</h1>
  <p>제가 만든 첫 번째 웹페이지예요!</p>
</body>
</html>`,

  button: `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; }
    button { font-size: 20px; padding: 15px 30px; background: #4F8EF7; color: white; border: none; border-radius: 12px; cursor: pointer; }
    button:hover { background: #2563EB; }
    #msg { font-size: 1.5em; margin-top: 20px; }
  </style>
</head>
<body>
  <h2>버튼을 클릭해보세요!</h2>
  <button onclick="clicked()">🎉 클릭!</button>
  <div id="msg"></div>
  <script>
    let count = 0;
    function clicked() {
      count++;
      document.getElementById('msg').textContent = count + '번 클릭했어요!';
    }
  <\/script>
</body>
</html>`,

  color: `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; transition: background 0.5s; }
    .box { width: 150px; height: 150px; margin: 20px auto; border-radius: 20px; transition: background 0.5s; background: #4F8EF7; }
    button { font-size: 18px; padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; background: #1E293B; color: white; }
  </style>
</head>
<body>
  <h2>🎨 색깔을 바꿔보세요!</h2>
  <div class="box" id="box"></div>
  <button onclick="changeColor()">색깔 바꾸기!</button>
  <script>
    const colors = ['#4F8EF7','#F472B6','#34D399','#FBBF24','#F87171','#A78BFA'];
    let i = 0;
    function changeColor() {
      i = (i + 1) % colors.length;
      document.getElementById('box').style.background = colors[i];
      document.body.style.background = colors[i] + '22';
    }
  <\/script>
</body>
</html>`,

  card: `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #F0F4FF; margin: 0; }
    .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); text-align: center; width: 260px; }
    .avatar { font-size: 4em; margin-bottom: 10px; }
    h2 { color: #1E293B; margin-bottom: 6px; }
    p { color: #64748B; font-size: 14px; }
    .tag { display: inline-block; background: #EBF2FF; color: #2563EB; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">🧑‍💻</div>
    <h2>바이브 코더</h2>
    <p>AI와 함께 코딩하는 걸 좋아해요!</p>
    <div class="tag">✨ 코딩 중</div>
  </div>
</body>
</html>`,

  counter: `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; background: #FFFBEB; }
    .count { font-size: 5em; font-weight: bold; color: #1E293B; margin: 20px 0; }
    .btns { display: flex; gap: 16px; justify-content: center; }
    button { font-size: 24px; width: 60px; height: 60px; border: none; border-radius: 50%; cursor: pointer; font-weight: bold; }
    .minus { background: #FCA5A5; color: #7F1D1D; }
    .plus { background: #86EFAC; color: #14532D; }
    .reset { font-size: 14px; margin-top: 16px; background: #E2E8F0; color: #475569; padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h2>🔢 숫자 세기</h2>
  <div class="count" id="num">0</div>
  <div class="btns">
    <button class="minus" onclick="change(-1)">−</button>
    <button class="plus" onclick="change(1)">+</button>
  </div>
  <br>
  <button class="reset" onclick="reset()">초기화</button>
  <script>
    let n = 0;
    function change(v) {
      n += v;
      document.getElementById('num').textContent = n;
    }
    function reset() { n = 0; document.getElementById('num').textContent = 0; }
  <\/script>
</body>
</html>`
};

function downloadCode() {
  const code = document.getElementById('editor').value.trim();
  if (!code) {
    document.getElementById('statusDot').className = 'status-indicator warn';
    document.getElementById('statusMsg').textContent = 'HTML 코드를 먼저 입력해주세요!';
    return;
  }
  const blob = new Blob([code], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '내작품.html';
  a.click();
  URL.revokeObjectURL(url);
  document.getElementById('statusDot').className = 'status-indicator ok';
  document.getElementById('statusMsg').textContent = '다운로드 완료! ✓';
}

function runCode() {
  const code = document.getElementById('editor').value.trim();
  const iframe = document.getElementById('preview');
  const dot = document.getElementById('statusDot');
  const msg = document.getElementById('statusMsg');
  if (!code) {
    dot.className = 'status-indicator warn';
    msg.textContent = 'HTML 코드를 먼저 입력해주세요!';
    return;
  }
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open(); doc.write(code); doc.close();
  dot.className = 'status-indicator ok';
  const lines = code.split('\n').length;
  msg.textContent = `실행 완료! ✓  (${lines}줄)`;
}

function clearAll() {
  document.getElementById('editor').value = '';
  const iframe = document.getElementById('preview');
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open(); doc.write(''); doc.close();
  document.getElementById('statusDot').className = 'status-indicator';
  document.getElementById('statusMsg').textContent = '코드를 붙여넣고 실행해보세요!';
}

function toggleSamples() {
  const bar = document.getElementById('samplesBar');
  bar.style.display = bar.style.display === 'none' ? 'flex' : 'none';
}

function loadSample(key) {
  document.getElementById('editor').value = samples[key];
  document.getElementById('samplesBar').style.display = 'none';
  runCode();
}

document.getElementById('editor').addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = this.selectionStart, end = this.selectionEnd;
    this.value = this.value.substring(0, s) + '  ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = s + 2;
  }
});

function openShare() {
  const code = document.getElementById('editor').value.trim();
  if (!code) {
    document.getElementById('statusDot').className = 'status-indicator warn';
    document.getElementById('statusMsg').textContent = 'HTML 코드를 먼저 입력해주세요!';
    return;
  }
  document.getElementById('shareUrlText').textContent = '링크 생성 버튼을 눌러주세요!';
  document.getElementById('generateBtn').style.display = 'inline-block';
  document.getElementById('copyBtn').style.display = 'none';
  document.getElementById('generateBtn').textContent = '링크 생성';
  document.getElementById('generateBtn').disabled = false;
  document.getElementById('shareNameInput').value = '';
  document.getElementById('shareOverlay').classList.add('show');
}

function closeShare() {
  document.getElementById('shareOverlay').classList.remove('show');
}

function closeShareIfBg(e) {
  if (e.target === document.getElementById('shareOverlay')) closeShare();
}

async function generateLink() {
  const code = document.getElementById('editor').value.trim();
  const name = document.getElementById('shareNameInput').value.trim() || '익명';
  const btn = document.getElementById('generateBtn');
  btn.textContent = '생성 중...';
  btn.disabled = true;

  try {
    const res = await fetch('https://paste.rs', {
      method: 'POST',
      body: code
    });
    const pasteUrl = await res.text();
    const id = pasteUrl.trim().replace('https://paste.rs/', '');
    const base = window.location.href.split('?')[0];
    const url = `${base}?id=${id}&name=${encodeURIComponent(name)}`;
    document.getElementById('shareUrlText').textContent = url;
    document.getElementById('copyBtn').style.display = 'inline-block';
    btn.style.display = 'none';
  } catch(e) {
    document.getElementById('shareUrlText').textContent = '오류가 발생했어요. 다시 시도해주세요.';
    btn.textContent = '링크 생성';
    btn.disabled = false;
  }
}

function copyLink() {
  const url = document.getElementById('shareUrlText').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '복사됨 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
  });
}

// URL에서 코드 불러오기
(async function loadFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const name = params.get('name');
  if (id) {
    document.getElementById('statusMsg').textContent = '작품 불러오는 중...';
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, {
        headers: { 'X-Master-Key': '$2a$10$69e722af10716a4d5de5d6be' }
      });
      const data = await res.json();
      const code = data.record.code;
      const savedName = data.record.name || name || '친구';
      document.getElementById('editor').value = code;
      setTimeout(() => {
        runCode();
        document.getElementById('statusMsg').textContent = `${savedName}의 작품이에요! 🎉`;
      }, 100);
    } catch(e) {
      document.getElementById('statusMsg').textContent = '작품을 불러오지 못했어요.';
    }
  }
})();
</script>
