<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 바이브 코딩 놀이터</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #4F8EF7;
    --blue-light: #EBF2FF;
    --blue-dark: #2563EB;
    --bg: #EEF3FF;
    --white: #FFFFFF;
    --text: #1E293B;
    --text-muted: #64748B;
    --border: #DDE6F8;
    --radius: 24px;
    --radius-sm: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Dotted background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #C7D9F8 1.2px, transparent 1.2px);
    background-size: 28px 28px;
    z-index: 0;
    opacity: 0.55;
  }

  header {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 700px;
    padding: 32px 24px 0;
    display: flex;
    justify-content: center;
  }

  .header-badge {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 13px;
    font-weight: 700;
    color: var(--blue-dark);
    letter-spacing: 0.01em;
  }

  main {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 700px;
    padding: 28px 24px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* Hero title */
  .hero {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .hero-icon {
    font-size: 44px;
    margin-bottom: 4px;
    filter: drop-shadow(0 4px 12px rgba(79,142,247,0.25));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .hero h1 {
    font-size: 34px;
    font-weight: 900;
    color: var(--blue-dark);
    line-height: 1.2;
    letter-spacing: -0.02em;
  }

  .hero p {
    font-size: 15px;
    color: var(--text-muted);
    font-weight: 600;
    margin-top: 2px;
  }

  /* Cards grid */
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    width: 100%;
  }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    padding: 28px 18px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 14px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    box-shadow: 0 2px 16px rgba(79,142,247,0.07);
    position: relative;
    overflow: hidden;
  }

  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(79,142,247,0.06) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: inherit;
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 36px rgba(79,142,247,0.18);
    border-color: #A5C0F8;
  }

  .card:hover::after { opacity: 1; }
  .card:active { transform: translateY(-2px) scale(0.98); }

  .card-emoji {
    font-size: 52px;
    line-height: 1;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    transition: transform 0.2s;
  }

  .card:hover .card-emoji { transform: scale(1.12) rotate(-4deg); }

  .card-num {
    font-size: 11px;
    font-weight: 800;
    color: #94A3B8;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .card-title {
    font-size: 17px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.35;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 600;
    line-height: 1.6;
  }

  .card-btn {
    margin-top: 4px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.15s;
  }

  /* Card 1 — Gemini */
  .card-1 .card-btn {
    background: #EEF3FF;
    color: var(--blue-dark);
  }
  .card-1:hover .card-btn {
    background: var(--blue-dark);
    color: white;
  }

  /* Card 2 — Code lab */
  .card-2 .card-btn {
    background: #FFF3E0;
    color: #C2410C;
  }
  .card-2:hover .card-btn {
    background: #F97316;
    color: white;
  }

  /* Card 3 — Gallery (disabled/coming soon) */
  .card-3 {
    opacity: 0.7;
    cursor: default;
  }
  .card-3:hover {
    transform: none;
    box-shadow: 0 2px 16px rgba(79,142,247,0.07);
    border-color: var(--border);
  }
  .card-3:hover::after { opacity: 0; }
  .card-3:hover .card-emoji { transform: none; }
  .card-3 .card-btn {
    background: #F1F5F9;
    color: #94A3B8;
  }
  .coming-soon {
    position: absolute;
    top: 14px;
    right: 14px;
    background: #F1F5F9;
    color: #94A3B8;
    font-size: 10px;
    font-weight: 800;
    padding: 3px 8px;
    border-radius: 8px;
    letter-spacing: 0.04em;
  }

  /* Footer */
  footer {
    position: relative;
    z-index: 10;
    font-size: 12px;
    color: #94A3B8;
    font-weight: 600;
    padding-bottom: 24px;
  }

  @media (max-width: 600px) {
    .cards { grid-template-columns: 1fr; max-width: 320px; }
    .hero h1 { font-size: 26px; }
  }
</style>
</head>
<body>

<header>
  <span class="header-badge">✨ 상상하는 모든 것을 코드로 만들어보세요!</span>
</header>

<main>
  <div class="hero">
    <div class="hero-icon">💎</div>
    <h1>AI 바이브 코딩 놀이터</h1>
    <p>무엇을 만들고 싶으신가요?</p>
  </div>

  <div class="cards">

    <!-- Card 1: Gemini -->
    <a class="card card-1" href="https://gemini.google.com/gem/1zBZNHGjMNOnmS9pH38U4IfrKc2tVKHZ4?usp=sharing" target="_blank" rel="noopener">
      <div class="card-num">01</div>
      <div class="card-emoji">🤖</div>
      <div class="card-title">젬(Gemini)<br>소환하기</div>
      <div class="card-desc">선생님의 젬에게 어떤 웹사이트나 게임을 만들고 싶은지 말해보세요.</div>
      <button class="card-btn">시작하기 →</button>
    </a>

    <!-- Card 2: Code lab -->
    <a class="card card-2" href="vibe-coding-playground.html" target="_blank" rel="noopener">
      <div class="card-num">02</div>
      <div class="card-emoji">🚀</div>
      <div class="card-title">코드 실험실<br>입장</div>
      <div class="card-desc">젬이 만들어준 코드를 복사했다면, 이곳에서 실행하고 확인해보세요!</div>
      <button class="card-btn">입장하기 →</button>
    </a>

    <!-- Card 3: Gallery (coming soon) -->
    <div class="card card-3">
      <span class="coming-soon">준비 중</span>
      <div class="card-num">03</div>
      <div class="card-emoji">🖼️</div>
      <div class="card-title">우리 반<br>갤러리</div>
      <div class="card-desc">친구들이 만든 멋진 작품들을 구경하고 실행해 보세요!</div>
      <button class="card-btn" disabled>곧 오픈!</button>
    </div>

  </div>
</main>

<footer>만든이: 선생님 | AI 바이브 코딩 놀이터</footer>

</body>
</html>
